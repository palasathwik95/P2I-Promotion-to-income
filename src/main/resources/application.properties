spring.application.name=FirstProject
server.port=8080

# Database configurations
# Use environment variables when available, otherwise fall back to a local embedded H2 database.
spring.datasource.url=${DB_URL:jdbc:h2:mem:p2i;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA and Hibernate configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT Security Configurations
p2i.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 24 hours in milliseconds
p2i.jwt.expiration=86400000

# Cloudinary Storage Configurations (Stub values, will handle gracefully)
cloudinary.cloud-name=demo-cloud
cloudinary.api-key=1234567890
cloudinary.api-secret=abcdefghijklmnopqrstuvwxyz

# Razorpay Payments (Stub values, will handle validation logic gracefully)
razorpay.key-id=rzp_test_stubid
razorpay.key-secret=stubsecret

# Spring Mail Configurations (Configured to use SMTP or fallback gracefully in code)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=p2i.platform@gmail.com
spring.mail.password=stubpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
